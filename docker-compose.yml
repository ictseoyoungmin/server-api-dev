version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=miewid
      - DEVICE=cuda:0
      - HF_CACHE_DIR=/models/hf
      - LOG_LEVEL=INFO
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=pet_instances_v1
      - STORAGE_DIR=/app/data
      - YOLO_WEIGHTS_PATH=/app/weights/yolo/yolo26x.pt
      - YOLO_TASK=detect
      - YOLO_CLASS_IDS=15,16
    volumes:
      - ./weights:/app/weights
      - ./models_cache:/models/hf
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
